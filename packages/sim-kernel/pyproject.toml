[project]
name = "fos-sim-kernel"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
  "fos-contracts",
  "numpy>=2.0.0",
  "pyarrow>=18.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/fos_sim_kernel", "src/fw_kernel"]
