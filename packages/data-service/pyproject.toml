[project]
name = "fos-data-service"
version = "0.1.0"
description = "Request-status metadata service scaffolding for FOS data workstream"
requires-python = ">=3.11"
dependencies = [
  "fastapi",
  "fos-data-pipelines",
]

[tool.uv.sources]
fos-data-pipelines = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/fos_data_service"]
