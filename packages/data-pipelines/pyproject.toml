[project]
name = "fos-data-pipelines"
version = "0.1.0"
description = "Offline-safe data pipeline scaffolding for FOS data workstream"
requires-python = ">=3.11"
dependencies = [
  "fw-contracts",
  "pydantic",
]

[tool.uv.sources]
fw-contracts = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/fos_data_pipelines"]
