[project]
name = "fos-population-synth"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
  "fsspec>=2024.12.0",
  "fos-contracts",
  "numpy>=2.0.0",
  "pyarrow>=18.0.0",
  "pyyaml>=6.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/fos_population_synth", "src/fw_synth"]
