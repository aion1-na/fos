[project]
name = "fos-adapters"
version = "0.1.0"
description = "Adapter registry and trust policy contracts for FOS external tool integrations"
requires-python = ">=3.11"
dependencies = [
  "fos-contracts",
  "pydantic>=2.9.0",
]

[tool.uv.sources]
fos-contracts = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/fos_adapters"]
