name: ci

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "17 8 * * *"

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.24"

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Python dependencies
        run: uv sync --all-packages

      - name: Ruff
        run: uv run ruff check .

      - name: Kernel import seam
        run: python3 tools/lint/import-lint.py

      - name: Pack lint
        run: python3 tools/lint/pack-lint.py

      - name: OpenAPI client generation is current
        run: uv run python tools/codegen/openapi_to_ts.py && git diff --exit-code packages/contracts/dist/api

      - name: Agent-step performance budget
        run: uv run python tools/perf/agent_step_budget.py

      - name: Node lint
        run: pnpm -r lint

      - name: Python tests
        run: uv run pytest

      - name: Node tests
        run: pnpm -r test
